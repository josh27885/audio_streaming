workflows:
  ios-unsigned-workflow:
    name: Build iOS App (Unsigned)
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      
      # NEW STEP: Forcefully overwrite the Flutter/Xcode config to completely disable signing
      - name: Nullify iOS Code Signing
        script: |
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=\"\"" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM=\"\"" >> ios/Flutter/Release.xcconfig
      
      - name: Build iOS App
        script: flutter build ios --release --no-codesign
      
      - name: Package into IPA
        script: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r -q VoiceController.ipa Payload
    artifacts:
      - build/ios/iphoneos/VoiceController.ipa